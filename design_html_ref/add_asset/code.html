<main class="pt-20 pb-32 px-container-padding custom-gradient min-h-screen">
<form class="max-w-md mx-auto space-y-section-margin" id="asset-form">

<div class="flex flex-col items-center space-y-2 text-on-surface-variant group-hover:text-primary" id="upload-placeholder">

</div>
</div>
<!-- Form Content -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm space-y-6">

<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant/50" placeholder="e.g. MacBook Pro 14" type="text"/>
</div>
<!-- Category -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-on-surface-variant">Category</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-body-lg font-body-lg text-on-surface appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select category</option>
<option value="digital">Life Digital</option>
<option value="vehicles">Vehicles</option>
<option value="art">Art Collection</option>
<option value="tools">Academic Tools</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>

<div class="fixed bottom-0 left-0 right-0 p-container-padding bg-surface/80 backdrop-blur-md border-t border-outline-variant shadow-lg z-50">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm py-5 px-6 rounded-xl shadow-[0_8px_30px_rgb(204,255,0,0.3)] hover:shadow-[0_8px_30px_rgb(204,255,0,0.5)] hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] active:shadow-inner transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                Save Asset
            </button>
</div>
</div>
<script>
        // Simple Interaction logic
        const uploadArea = document.getElementById('image-preview-container');
        const imgPreview = document.getElementById('image-preview');
        const uploadPlaceholder = document.getElementById('upload-placeholder');

        uploadArea.addEventListener('click', () => {
            // Simulate photo selection
            if (imgPreview.classList.contains('hidden')) {
                imgPreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
                uploadArea.classList.remove('border-dashed');
                uploadArea.classList.add('border-solid', 'border-primary');
            } else {
                imgPreview.classList.add('hidden');
                uploadPlaceholder.classList.remove('hidden');
                uploadArea.classList.add('border-dashed');
                uploadArea.classList.remove('border-solid', 'border-primary');
            }
        });

        // Dynamic gradient movement for background flair
        document.addEventListener('mousemove', (e) => {
            const body = document.querySelector('main');
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            body.style.background = `radial-gradient(circle at ${x}% ${y}%, #ccff0011 0%, #faf9fe 70%)`;
        });
    </script>

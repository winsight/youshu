      <stop offset="0%" stop-color="#EBFF66" />
      <stop offset="100%" stop-color="#CBE800" />
    </linearGradient>
    
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D7004" />
      <stop offset="100%" stop-color="#3A4700" />

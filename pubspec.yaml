name: asset_sum
description: "Personal Asset Tracking & Statistics App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local database
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP & WebDAV
  dio: ^5.7.0
  webdav_client: ^1.2.0

  # Images
  image_picker: ^1.1.2
  image: ^4.5.3

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/

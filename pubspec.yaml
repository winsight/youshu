name: asset_sum
description: "有数 - 个人资产管理与统计应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local database
  drift: ^2.25.1
  drift_sqflite: ^2.0.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP & WebDAV
  dio: ^5.7.0
  webdav_client: ^1.2.0

  # OAuth / Cloud Sync
  google_sign_in: ^6.3.0
  flutter_appauth: ^8.0.0

  # Images
  image_picker: ^1.1.2
  image: ^4.5.3
  image_cropper: ^12.2.1
  google_mlkit_subject_segmentation: ^0.0.3

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
